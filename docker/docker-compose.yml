# docker-compose.yml – Notar GNotKG Assistent Cloud
# Cloud-API-Version: externe LLM-Provider via LiteLLM, kein lokaler Ollama-Dienst nötig

version: "3.9"

services:
  notar-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: notar-gnotkg-app
    ports:
      - "8501:8501"
    volumes:
      # Daten persistieren außerhalb des Containers
      - ../data:/app/data
      # Audit-Logs und History persistieren
      - ../history:/app/history
      # Optional: Beispielurkunden als Read-Only einbinden
      - ../Beispielurkunden:/app/Beispielurkunden:ro
      # Optional: GNotKG-XML als Read-Only
      - ../Gesetze:/app/Gesetze:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=127.0.0.1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    extra_hosts:
      # host.docker.internal für macOS und Windows
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Ressourcen-Begrenzung
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

# Hinweise:
# - Die App benötigt ausgehenden HTTPS-Zugriff zum gewählten LLM-Provider.
# - API-Keys werden entweder über die UI verschlüsselt in ../data gespeichert
#   oder beim Container-Start via Umgebungsvariable (z. B. MISTRAL_API_KEY) übergeben.
