name: CI – Tests & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv@v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy core ui app.py tests --ignore-missing-imports
      - name: Tests with coverage
        run: uv run pytest tests/ -v --cov --cov-fail-under=80

  security:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          ./gitleaks version
      - name: Run Gitleaks
        run: ./gitleaks detect --source . --redact -v --exit-code=2

      - name: Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=auto --config p/python --config p/owasp-top-ten --error

      - name: pip-audit
        # astral-sh/setup-uv@v5
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
      - name: Run pip-audit
        run: |
          uv sync
          uv run pip-audit

  test-macos:
    runs-on: macos-latest
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # astral-sh/setup-uv@v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest tests/ -v
